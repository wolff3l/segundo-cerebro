<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segundo Cerebro — Revisión Semanal</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f98a3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
/* ── TOKENS ── */
:root, [data-theme="light"] {
  --color-bg:             #f7f6f2;
  --color-surface:        #f9f8f5;
  --color-surface-2:      #fbfbf9;
  --color-surface-offset: #f3f0ec;
  --color-surface-offset-2: #edeae5;
  --color-surface-dynamic: #e6e4df;
  --color-divider:        #dcd9d5;
  --color-border:         #d4d1ca;
  --color-text:           #28251d;
  --color-text-muted:     #7a7974;
  --color-text-faint:     #bab9b4;
  --color-text-inverse:   #f9f8f4;
  --color-primary:        #01696f;
  --color-primary-hover:  #0c4e54;
  --color-primary-active: #0f3638;
  --color-primary-highlight: #cedcd8;
  --color-orange:         #da7101;
  --color-gold:           #d19900;
  --color-success:        #437a22;
  --color-blue:           #006494;
  --color-purple:         #7a39bb;
  --color-error:          #a12c7b;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
  --space-12: 3rem; --space-16: 4rem;
  --font-body: 'Inter', sans-serif;
  --font-display: 'Instrument Serif', Georgia, serif;
  --sidebar-width: 240px;
}
[data-theme="dark"] {
  --color-bg:             #171614;
  --color-surface:        #1c1b19;
  --color-surface-2:      #201f1d;
  --color-surface-offset: #1d1c1a;
  --color-surface-offset-2: #22211f;
  --color-surface-dynamic: #2d2c2a;
  --color-divider:        #262523;
  --color-border:         #393836;
  --color-text:           #cdccca;
  --color-text-muted:     #797876;
  --color-text-faint:     #5a5957;
  --color-text-inverse:   #2b2a28;
  --color-primary:        #4f98a3;
  --color-primary-hover:  #227f8b;
  --color-primary-active: #1a626b;
  --color-primary-highlight: #313b3b;
  --color-orange:         #fdab43;
  --color-gold:           #e8af34;
  --color-success:        #6daa45;
  --color-blue:           #5591c7;
  --color-purple:         #a86fdf;
  --color-error:          #d163a7;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) { --color-bg:#f7f6f2; --color-surface:#f9f8f5; --color-text:#28251d; }
}

/* ── BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body {
  min-height: 100dvh; font-family: var(--font-body);
  font-size: var(--text-sm); color: var(--color-text);
  background: var(--color-bg); display: flex; overflow: hidden; height: 100dvh;
}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
input, textarea, select { font: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; border-radius: var(--radius-sm); }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-width); min-height: 100dvh; background: var(--color-surface);
  border-right: 1px solid var(--color-divider); display: flex; flex-direction: column;
  flex-shrink: 0; overflow-y: auto;
}
.sidebar-brand {
  padding: var(--space-5) var(--space-4) var(--space-4);
  border-bottom: 1px solid var(--color-divider);
  display: flex; align-items: center; gap: var(--space-3);
}
.brand-logo {
  width: 32px; height: 32px; flex-shrink: 0;
}
.brand-name {
  font-family: var(--font-display); font-size: var(--text-base); line-height: 1.2;
  color: var(--color-text);
}
.brand-sub { font-size: var(--text-xs); color: var(--color-text-muted); }

.sidebar-section { padding: var(--space-4) var(--space-3) var(--space-2); }
.sidebar-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--color-text-faint);
  padding: 0 var(--space-2); margin-bottom: var(--space-2);
}
.nav-item {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-2) var(--space-3); border-radius: var(--radius-md);
  color: var(--color-text-muted); font-size: var(--text-sm); cursor: pointer;
  transition: background var(--transition), color var(--transition);
  width: 100%; text-align: left;
}
.nav-item:hover { background: var(--color-surface-dynamic); color: var(--color-text); }
.nav-item.active {
  background: var(--color-primary-highlight); color: var(--color-primary);
  font-weight: 500;
}
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: var(--color-primary); color: var(--color-text-inverse);
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: var(--radius-full);
  min-width: 18px; text-align: center;
}

.sidebar-footer {
  margin-top: auto; padding: var(--space-4) var(--space-3);
  border-top: 1px solid var(--color-divider);
  display: flex; align-items: center; justify-content: space-between;
}
.week-indicator {
  font-size: var(--text-xs); color: var(--color-text-muted);
}
.week-label { font-size: 10px; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.06em; }

/* ── MAIN CONTENT ── */
.main {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0;
}
.topbar {
  position: sticky; top: 0; z-index: 10;
  background: color-mix(in oklch, var(--color-bg) 80%, transparent);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--color-divider);
  padding: var(--space-4) var(--space-8);
  display: flex; align-items: center; justify-content: space-between; gap: var(--space-4);
}
.topbar-title { font-size: var(--text-base); font-weight: 600; }
.topbar-actions { display: flex; align-items: center; gap: var(--space-3); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-4); border-radius: var(--radius-md);
  font-size: var(--text-sm); font-weight: 500; cursor: pointer;
  transition: background var(--transition), color var(--transition), box-shadow var(--transition);
  white-space: nowrap;
}
.btn svg { width: 15px; height: 15px; }
.btn-primary {
  background: var(--color-primary); color: var(--color-text-inverse);
}
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-ghost {
  background: transparent; color: var(--color-text-muted);
  border: 1px solid var(--color-border);
}
.btn-ghost:hover { background: var(--color-surface-dynamic); color: var(--color-text); }
.btn-icon {
  padding: var(--space-2); border-radius: var(--radius-md);
  color: var(--color-text-muted); transition: background var(--transition), color var(--transition);
}
.btn-icon:hover { background: var(--color-surface-dynamic); color: var(--color-text); }
.btn-icon svg { width: 18px; height: 18px; display: block; }

/* ── VIEWS ── */
.view { display: none; padding: var(--space-8); max-width: 900px; margin: 0 auto; width: 100%; }
.view.active { display: block; }

/* ── ADD ENTRY PANEL ── */
.add-panel {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-xl); padding: var(--space-5); margin-bottom: var(--space-6);
  box-shadow: var(--shadow-sm);
}
.add-panel-header {
  font-size: var(--text-sm); font-weight: 600; margin-bottom: var(--space-4);
  color: var(--color-text-muted); display: flex; align-items: center; gap: var(--space-2);
}
.input-row { display: grid; gap: var(--space-3); margin-bottom: var(--space-3); }
.input-field {
  background: var(--color-bg); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: var(--space-3) var(--space-4);
  font-size: var(--text-sm); color: var(--color-text); width: 100%;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.input-field:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.12); outline: none; }
.input-field::placeholder { color: var(--color-text-faint); }
textarea.input-field { resize: vertical; min-height: 80px; line-height: 1.6; }

.type-chips { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-3); }
.chip {
  display: inline-flex; align-items: center; gap: var(--space-1);
  padding: var(--space-1) var(--space-3); border-radius: var(--radius-full);
  font-size: var(--text-xs); font-weight: 500; cursor: pointer;
  border: 1px solid var(--color-border); background: var(--color-surface-offset);
  color: var(--color-text-muted); transition: all var(--transition);
}
.chip.selected { border-color: var(--color-primary); background: var(--color-primary-highlight); color: var(--color-primary); }
.chip svg { width: 12px; height: 12px; }

.tags-row { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
.tag { display: inline-flex; align-items: center; gap: var(--space-1); padding: 2px var(--space-3); border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 500; background: var(--color-surface-dynamic); color: var(--color-text-muted); }
.tag-remove { cursor: pointer; color: var(--color-text-faint); transition: color var(--transition); }
.tag-remove:hover { color: var(--color-error); }

.add-tag-input {
  background: none; border: none; outline: none; font-size: var(--text-xs);
  color: var(--color-text); placeholder-color: var(--color-text-faint);
  min-width: 80px;
}

.form-footer { display: flex; align-items: center; justify-content: space-between; margin-top: var(--space-3); }

/* ── ENTRIES LIST ── */
.entries-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--space-5);
}
.entries-header h2 { font-size: var(--text-base); font-weight: 600; }
.entry-count { font-size: var(--text-xs); color: var(--color-text-muted); }

.topic-group { margin-bottom: var(--space-8); }
.topic-group-header {
  display: flex; align-items: center; gap: var(--space-3);
  margin-bottom: var(--space-4); padding-bottom: var(--space-3);
  border-bottom: 1px solid var(--color-divider);
}
.topic-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.topic-name { font-weight: 600; font-size: var(--text-sm); }
.topic-count { font-size: var(--text-xs); color: var(--color-text-faint); }

.entry-card {
  background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.08);
  border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5);
  margin-bottom: var(--space-3); transition: box-shadow var(--transition), border-color var(--transition);
  position: relative;
}
.entry-card:hover { box-shadow: var(--shadow-md); border-color: oklch(from var(--color-text) l c h / 0.14); }
.entry-meta { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-2); }
.entry-type-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: var(--radius-full);
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
}
.type-nota { background: color-mix(in oklch, var(--color-blue) 15%, transparent); color: var(--color-blue); }
.type-idea { background: color-mix(in oklch, var(--color-gold) 15%, transparent); color: var(--color-gold); }
.type-tarea { background: color-mix(in oklch, var(--color-success) 15%, transparent); color: var(--color-success); }
.type-reflexion { background: color-mix(in oklch, var(--color-purple) 15%, transparent); color: var(--color-purple); }

.entry-date { font-size: var(--text-xs); color: var(--color-text-faint); margin-left: auto; }
.entry-title { font-size: var(--text-sm); font-weight: 600; margin-bottom: var(--space-1); }
.entry-body { font-size: var(--text-sm); color: var(--color-text-muted); line-height: 1.7; }
.entry-tags { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: var(--space-3); }
.entry-tag { padding: 2px 8px; border-radius: var(--radius-full); font-size: 10px; font-weight: 500; background: var(--color-surface-dynamic); color: var(--color-text-muted); }
.entry-actions { position: absolute; top: var(--space-3); right: var(--space-3); display: none; gap: var(--space-1); }
.entry-card:hover .entry-actions { display: flex; }

/* ── WEEKLY REVIEW ── */
.review-header {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-xl); padding: var(--space-6); margin-bottom: var(--space-6);
  text-align: center;
}
.review-title {
  font-family: var(--font-display); font-size: var(--text-xl);
  color: var(--color-text); margin-bottom: var(--space-2);
}
.review-subtitle { font-size: var(--text-sm); color: var(--color-text-muted); }

.stats-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4);
  margin-bottom: var(--space-6);
}
.stat-card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: var(--space-4);
  text-align: center;
}
.stat-value { font-size: var(--text-xl); font-weight: 700; color: var(--color-primary); font-variant-numeric: tabular-nums; }
.stat-label { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1); }

.section-heading {
  font-size: var(--text-base); font-weight: 600; margin-bottom: var(--space-4);
  display: flex; align-items: center; gap: var(--space-2);
}
.section-heading svg { width: 18px; height: 18px; color: var(--color-primary); }

/* Topic Summary Cards */
.topic-summary-grid { display: grid; gap: var(--space-4); margin-bottom: var(--space-8); }
.topic-summary-card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: var(--space-5); overflow: hidden;
  position: relative;
}
.topic-summary-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.topic-summary-card-header { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-3); }
.topic-summary-title { font-weight: 600; font-size: var(--text-sm); }
.topic-summary-count { font-size: var(--text-xs); color: var(--color-text-faint); }
.topic-summary-body { font-size: var(--text-sm); color: var(--color-text-muted); line-height: 1.7; margin-bottom: var(--space-3); }
.topic-summary-items { list-style: none; display: flex; flex-direction: column; gap: var(--space-1); }
.topic-summary-items li {
  font-size: var(--text-xs); color: var(--color-text-muted);
  display: flex; align-items: flex-start; gap: var(--space-2); padding: var(--space-1) 0;
}
.topic-summary-items li::before { content: '·'; color: var(--color-primary); font-size: 1.2em; flex-shrink: 0; margin-top: -1px; }

/* Connections */
.connections-list { display: flex; flex-direction: column; gap: var(--space-4); margin-bottom: var(--space-8); }
.connection-card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5);
}
.connection-header { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-2); }
.connection-strength {
  display: flex; gap: 3px; align-items: center;
}
.strength-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-border); }
.strength-dot.filled { background: var(--color-primary); }
.connection-topics { display: flex; align-items: center; gap: var(--space-2); font-weight: 600; font-size: var(--text-sm); }
.connection-arrow { color: var(--color-primary); }
.connection-body { font-size: var(--text-sm); color: var(--color-text-muted); line-height: 1.6; }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; padding: var(--space-16) var(--space-8); color: var(--color-text-muted);
}
.empty-icon { width: 48px; height: 48px; color: var(--color-text-faint); margin-bottom: var(--space-4); }
.empty-state h3 { color: var(--color-text); margin-bottom: var(--space-2); }
.empty-state p { max-width: 36ch; font-size: var(--text-sm); margin-bottom: var(--space-5); }

/* ── THEME TOGGLE ── */
[data-theme-toggle] svg { width: 18px; height: 18px; display: block; }

/* ── TOPBAR BRAND (mobile) ── */
.topbar-brand {
  display: none; align-items: center; gap: var(--space-2); flex-shrink: 0;
}
.topbar-brand .brand-logo { width: 26px; height: 26px; flex-shrink: 0; }
.topbar-brand .brand-name { font-family: var(--font-display); font-size: var(--text-base); line-height: 1; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: var(--space-6); right: var(--space-6);
  background: var(--color-text); color: var(--color-text-inverse);
  padding: var(--space-3) var(--space-5); border-radius: var(--radius-md);
  font-size: var(--text-sm); font-weight: 500; z-index: 999;
  transform: translateY(20px); opacity: 0; transition: all 0.3s ease;
  pointer-events: none; display: flex; align-items: center; gap: var(--space-2);
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── REVIEW GEN BUTTON ── */
.review-generate-btn {
  display: flex; flex-direction: column; align-items: center; gap: var(--space-3);
  padding: var(--space-10); background: var(--color-surface);
  border: 2px dashed var(--color-border); border-radius: var(--radius-xl);
  cursor: pointer; width: 100%; transition: all var(--transition); margin-bottom: var(--space-6);
  color: var(--color-text-muted);
}
.review-generate-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-highlight); }
.review-generate-btn svg { width: 36px; height: 36px; }
.review-generate-btn strong { font-size: var(--text-sm); font-weight: 600; }
.review-generate-btn span { font-size: var(--text-xs); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }

/* ── BOTTOM NAV ── */
.bottom-nav { display: none; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  /* Ocultar sidebar de escritorio */
  .sidebar { display: none; }

  /* Bottom nav */
  .bottom-nav {
    display: flex; position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--color-surface); border-top: 1px solid var(--color-divider);
    z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0px);
    box-shadow: 0 -4px 16px oklch(0 0 0 / 0.08);
  }
  .bottom-nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; padding: var(--space-2) var(--space-1);
    color: var(--color-text-muted); font-size: 10px; font-weight: 500;
    cursor: pointer; transition: color var(--transition);
    position: relative; min-height: 56px;
  }
  .bottom-nav-item i, .bottom-nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
  .bottom-nav-item.active { color: var(--color-primary); }
  .bottom-nav-item.active .bnav-label { font-weight: 600; }
  .bottom-nav-badge {
    position: absolute; top: 5px; left: 50%; transform: translateX(4px);
    background: var(--color-primary); color: var(--color-text-inverse);
    font-size: 9px; font-weight: 700; padding: 1px 4px;
    border-radius: var(--radius-full); min-width: 15px; text-align: center;
    line-height: 14px; pointer-events: none;
  }

  /* Espacio para el bottom nav */
  .main { padding-bottom: calc(56px + env(safe-area-inset-bottom, 0px)); }

  /* Toast por encima del bottom nav */
  .toast {
    bottom: calc(56px + env(safe-area-inset-bottom, 0px) + var(--space-3));
    right: var(--space-4); left: var(--space-4);
    justify-content: center;

  /* Mostrar brand y ocultar título de vista en móvil */

}

/* Dispositivos táctiles: acciones visibles sin hover */
@media (hover: none) and (pointer: coarse) {
  .entry-card .entry-actions { display: flex; }
}
</style>
</head>

<!-- MAIN -->
<main class="main">
  <div class="topbar">

    <div class="topbar-brand">

        <circle cx="10" cy="16" r="2.5" fill="currentColor" opacity="0.7"/>
        <circle cx="22" cy="16" r="2.5" fill="currentColor" opacity="0.7"/>
        <line x1="10" y1="16" x2="22" y2="16" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>
        <circle cx="16" cy="12" r="1.5" fill="var(--color-primary)" opacity="0.9"/>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let entries = JSON.parse(localStorage.getItem('segundo_cerebro_entradas')) || [];
let currentTags = [];
let currentType = 'nota';
let reviewGenerated = false;
let editingId = null;

function saveState() {
  localStorage.setItem('segundo_cerebro_entradas', JSON.stringify(entries));
}

const TOPIC_COLORS = [
  { color: '#4f98a3', bg: 'rgba(79,152,163,0.12)' },
  { color: '#e8af34', bg: 'rgba(232,175,52,0.12)' },
  { color: '#6daa45', bg: 'rgba(109,170,69,0.12)' },
  { color: '#a86fdf', bg: 'rgba(168,111,223,0.12)' },
  { color: '#fdab43', bg: 'rgba(253,171,67,0.12)' },
  { color: '#5591c7', bg: 'rgba(85,145,199,0.12)' },
  { color: '#d163a7', bg: 'rgba(209,99,167,0.12)' },
];

// ── THEME TOGGLE ──
(function(){
  const buttons = document.querySelectorAll('[data-theme-toggle]');
  const r = document.documentElement;
  let d = r.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  r.setAttribute('data-theme', d);
  buttons.forEach(t => updateToggleIcon(t, d));
  buttons.forEach(t => t && t.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', d);
    buttons.forEach(b => updateToggleIcon(b, d));
  }));
  function updateToggleIcon(el, theme) {
    if (!el) return;
    el.innerHTML = theme === 'dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
})();

// ── WEEK RANGE ──
function getWeekRange() {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - ((day + 6) % 7));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = d => d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
  return `${fmt(mon)} – ${fmt(sun)}`;
}
document.getElementById('week-range').textContent = getWeekRange();

// ── VIEWS ──
const viewTitles = {
  captura: 'Capturar nueva entrada',
  semana: 'Esta semana',
  revision: 'Revisión semanal con IA',
  todas: 'Todas las notas'
};
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  const bnavEl = document.getElementById('bnav-' + name);
  if (bnavEl) bnavEl.classList.add('active');
  document.getElementById('view-title').textContent = viewTitles[name];

  if (name === 'semana') renderSemana();
  if (name === 'todas') renderTodas();
  if (name === 'revision') {
    document.getElementById('review-generator').style.display = reviewGenerated ? 'none' : '';
    document.getElementById('review-content').style.display = reviewGenerated ? '' : 'none';
  }
}

// ── TYPE SELECTOR ──
function selectType(el) {
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.remove('selected');
    c.setAttribute('aria-checked', 'false');
  });
  el.classList.add('selected');
  el.setAttribute('aria-checked', 'true');
  currentType = el.dataset.type;
}

// ── TAGS ──
function handleTagInput(e) {
  const input = document.getElementById('tag-input');
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = input.value.trim().toLowerCase().replace(/[^a-záéíóúüñ0-9_-\s]/gi, '');
    if (val && !currentTags.includes(val)) {
      currentTags.push(val);
      renderCurrentTags();
    }
    input.value = '';
  }
}
function renderCurrentTags() {
  const c = document.getElementById('tags-container');
  c.innerHTML = currentTags.map((t, i) =>
    `<span class="tag">${t} <span class="tag-remove" onclick="removeTag(${i})">×</span></span>`
  ).join('');
}
function removeTag(i) { currentTags.splice(i, 1); renderCurrentTags(); }

// ── SAVE ENTRY ──
function saveEntry() {
  const title = document.getElementById('entry-title').value.trim();
  const body = document.getElementById('entry-body').value.trim();
  if (!title && !body) { showToast('⚠️ Escribe algo antes de guardar'); return; }

  if (editingId) {
    const entry = entries.find(e => e.id === editingId);
    if (entry) {
      entry.title = title || body.substring(0, 60) + (body.length > 60 ? '…' : '');
      entry.body = body;
      entry.type = currentType;
      entry.tags = [...currentTags];
    }
    editingId = null;
    const saveBtn = document.getElementById('save-btn');
    if(saveBtn) saveBtn.innerHTML = '<i data-lucide="save"></i> Guardar entrada';
    showToast('✓ Entrada actualizada');
  } else {
    const entry = {
      id: Date.now(),
      title: title || body.substring(0, 60) + (body.length > 60 ? '…' : ''),
      body,
      type: currentType,
      tags: [...currentTags],
      date: new Date().toISOString(),
    };
    entries.unshift(entry);
    showToast('✓ Entrada guardada');
  }

  saveState();

  // reset form
  document.getElementById('entry-title').value = '';
  document.getElementById('entry-body').value = '';
  currentTags = [];
  renderCurrentTags();
  updateBadge();
  renderRecentEntries();
  reviewGenerated = false;
  lucide.createIcons();
}

function editEntry(id) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;

  editingId = id;
  
  document.getElementById('entry-title').value = entry.title;
  document.getElementById('entry-body').value = entry.body || '';
  
  currentTags = [...entry.tags];
  renderCurrentTags();
  
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.remove('selected');
    if (c.dataset.type === entry.type) c.classList.add('selected');
  });
  currentType = entry.type;

  const saveBtn = document.getElementById('save-btn');
  if(saveBtn) saveBtn.innerHTML = '<i data-lucide="edit-3"></i> Actualizar entrada';
  
  showView('captura');
  lucide.createIcons();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateBadge() {
  const thisWeek = getThisWeekEntries();
  document.getElementById('badge-semana').textContent = thisWeek.length;
  const bnavBadge = document.getElementById('bnav-badge-semana');
  if (bnavBadge) {
    bnavBadge.textContent = thisWeek.length;
    bnavBadge.style.display = thisWeek.length > 0 ? '' : 'none';
  }
}

function getThisWeekEntries() {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - ((day + 6) % 7)); mon.setHours(0,0,0,0);
  return entries.filter(e => new Date(e.date) >= mon);
}

// ── EXPORT / IMPORT ──
function exportData() {
  if(entries.length === 0) return showToast('⚠️ No hay entradas para exportar');
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries, null, 2));
  const el = document.createElement('a');
  el.setAttribute("href", dataStr);
  el.setAttribute("download", `segundo-cerebro-backup-${new Date().toISOString().slice(0,10)}.json`);
  document.body.appendChild(el);
  el.click();
  el.remove();
  showToast('✓ Respaldo exportado');
}

function handleImport(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const imported = JSON.parse(event.target.result);
      if(!Array.isArray(imported)) throw new Error('Formato inválido');
      if(confirm(`Estás a punto de importar ${imported.length} entradas. ¿Deseas reemplazar tus entradas actuales? (Aceptar = Reemplazar, Cancelar = Combinar)`)) {
        entries = imported;
      } else {
        const existingIds = new Set(entries.map(x => x.id));
        const newEntries = imported.filter(x => !existingIds.has(x.id));
        entries = [...newEntries, ...entries].sort((a,b) => new Date(b.date) - new Date(a.date));
      }
      saveState();
      updateBadge();
      renderRecentEntries();
      reviewGenerated = false;
      showToast('✓ Datos importados con éxito');
    } catch(err) {
      showToast('⚠️ Error al leer el archivo JSON');
    }
    e.target.value = ''; // reset input
  };
  reader.readAsText(file);
}

// ── MARKDOWN PARSER ──
function parseMarkdown(text) {
  if (!text) return '';
  let html = escHtml(text);
  // Bold
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
  // Links
  html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color:var(--color-primary);text-decoration:underline">$1</a>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  // Simple Lists (handles hyphen at the start of line)
  html = html.replace(/(^|<br>)- (.*?)(?=(<br>|$))/g, '$1• $2');
  return html;
}

// ── RENDER ENTRIES ──
function entryTypeClass(type) {
  return { nota: 'type-nota', idea: 'type-idea', tarea: 'type-tarea', reflexion: 'type-reflexion' }[type] || 'type-nota';
}
function entryTypeLabel(type) {
  return { nota: 'Nota', idea: 'Idea', tarea: 'Tarea', reflexion: 'Reflexión' }[type] || type;
}
function formatDate(iso) {
  return new Date(iso).toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}

function renderEntryCard(e, showDelete = true) {
  return `<div class="entry-card" id="card-${e.id}">
    <div class="entry-meta">
      <span class="entry-type-badge ${entryTypeClass(e.type)}">${entryTypeLabel(e.type)}</span>
      <span class="entry-date">${formatDate(e.date)}</span>
    </div>
    <div class="entry-title">${escHtml(e.title)}</div>
    ${e.body ? `<div class="entry-body">${parseMarkdown(e.body)}</div>` : ''}
    ${e.tags.length ? `<div class="entry-tags">${e.tags.map(t => `<span class="entry-tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
    ${showDelete ? `<div class="entry-actions">
      <button class="btn-icon" onclick="editEntry(${e.id})" title="Editar"><i data-lucide="edit-2" style="width:14px;height:14px"></i></button>
      <button class="btn-icon" onclick="deleteEntry(${e.id})" title="Eliminar"><i data-lucide="trash-2" style="width:14px;height:14px"></i></button>
    </div>` : ''}
  </div>`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderRecentEntries() {
  const list = document.getElementById('recent-entries-list');
  const count = document.getElementById('recent-count');
  const recent = entries.slice(0, 5);
  count.textContent = entries.length + ' total';

  if (recent.length === 0) {
    list.innerHTML = `<div class="empty-state"><i data-lucide="inbox" class="empty-icon"></i><h3>Sin entradas aún</h3><p>Captura notas, ideas y tareas a lo largo de la semana.</p><button class="btn btn-ghost" onclick="loadSampleData()"><i data-lucide="flask-conical"></i> Cargar datos de ejemplo</button></div>`;
    lucide.createIcons();
    return;
  }
  list.innerHTML = recent.map(e => renderEntryCard(e)).join('');
  lucide.createIcons();
}

function renderGrouped(entries, containerId, countId) {
  const container = document.getElementById(containerId);
  const countEl = document.getElementById(countId);
  countEl.textContent = entries.length + ' entradas';

  if (entries.length === 0) {
    container.innerHTML = `<div class="empty-state"><i data-lucide="calendar-x2" class="empty-icon"></i><h3>Sin entradas</h3><p>No hay nada aquí todavía.</p></div>`;
    lucide.createIcons(); return;
  }

  const topics = groupByTopic(entries);
  let html = '';
  let ci = 0;
  for (const [topic, topicEntries] of Object.entries(topics)) {
    const color = TOPIC_COLORS[ci % TOPIC_COLORS.length].color;
    ci++;
    html += `<div class="topic-group">
      <div class="topic-group-header">
        <div class="topic-dot" style="background:${color}"></div>
        <span class="topic-name">${escHtml(topic)}</span>
        <span class="topic-count">${topicEntries.length} entrada${topicEntries.length !== 1 ? 's' : ''}</span>
      </div>
      ${topicEntries.map(e => renderEntryCard(e)).join('')}
    </div>`;
  }
  container.innerHTML = html;
  lucide.createIcons();
}

function renderSemana() { renderGrouped(getThisWeekEntries(), 'semana-list', 'semana-count'); }
function renderTodas() { 
  const query = (document.getElementById('search-input').value || '').toLowerCase();
  if(!query) {
    renderGrouped(entries, 'todas-list', 'todas-count');
    return;
  }
  const filtered = entries.filter(e => 
    e.title.toLowerCase().includes(query) || 
    (e.body && e.body.toLowerCase().includes(query)) ||
    e.tags.some(t => t.toLowerCase().includes(query))
  );
  renderGrouped(filtered, 'todas-list', 'todas-count');
}
function filterTodas() { renderTodas(); }

function deleteEntry(id) {
  if (!confirm('¿Seguro que quieres eliminar esta entrada?')) return;

// ── TOPIC GROUPING ──
function groupByTopic(entries) {
  const groups = {};
  entries.forEach(e => {
    let topic = 'General';
    if (e.tags.length > 0) topic = capitalize(e.tags[0]);
    else {
      const keywords = extractKeywords(e.title + ' ' + e.body);
      if (keywords.length > 0) topic = capitalize(keywords[0]);
    }
    if (!groups[topic]) groups[topic] = [];
    groups[topic].push(e);
  });
  return groups;
}

function extractKeywords(text) {
  const stopwords = new Set(['el','la','los','las','un','una','de','del','en','y','a','que','es','se','no','con','por','para','una','este','esta','los','su','sus','al','me','mi','si','más','pero','o','como','ya','cuando','muy','sobre','también','hasta','hay','fue','era','ser','estar','tiene','tengo','hacer','todo','todos','toda','todas','cada','ese','esa','eso','puede','hace','han','son','ha','he','tu','te','le','les','nos','yo']);
  return text.toLowerCase()
    .replace(/[^a-záéíóúüñ\s]/gi, ' ')
    .split(/\s+/)
    .filter(w => w.length > 4 && !stopwords.has(w))
    .slice(0, 3);
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ── CONNECTIONS ──
function findConnections(entries) {
  const connections = [];
  const topics = groupByTopic(entries);
  const topicNames = Object.keys(topics);

  for (let i = 0; i < topicNames.length; i++) {
    for (let j = i + 1; j < topicNames.length; j++) {
      const a = topics[topicNames[i]];
      const b = topics[topicNames[j]];
      const conn = computeConnection(topicNames[i], a, topicNames[j], b);
      if (conn) connections.push(conn);
    }
  }
  return connections.sort((a, b) => b.strength - a.strength).slice(0, 5);
}

function computeConnection(topicA, entriesA, topicB, entriesB) {
  const wordsA = new Set(getAllWords(entriesA));
  const wordsB = new Set(getAllWords(entriesB));
  const shared = [...wordsA].filter(w => wordsB.has(w));
  const strength = Math.min(3, Math.ceil(shared.length / 2));

  // Type overlap
  const typesA = new Set(entriesA.map(e => e.type));
  const typesB = new Set(entriesB.map(e => e.type));
  const hasTypeOverlap = [...typesA].some(t => typesB.has(t));

  if (shared.length === 0 && !hasTypeOverlap) return null;

  const reasons = [];
  if (shared.length > 0) reasons.push(`Comparten conceptos: <em>${shared.slice(0,3).join(', ')}</em>`);
  if (hasTypeOverlap) reasons.push(`Mismo tipo de contenido`);

  return {
    topicA, topicB, strength: strength || 1,
    description: reasons.join(' · ') || 'Temáticas relacionadas que vale la pena conectar',
    sharedWords: shared.slice(0, 5)
  };
}

function getAllWords(entries) {
  return entries.flatMap(e => extractKeywords(e.title + ' ' + e.body + ' ' + e.tags.join(' ')));
}

// ── GENERATE REVIEW ──
function generateReview() {
  if (entries.length === 0) {
    showToast('⚠️ Añade entradas primero o carga los datos de ejemplo');
    return;
  }

  const thisWeek = getThisWeekEntries().length > 0 ? getThisWeekEntries() : entries;
  const topics = groupByTopic(thisWeek);
  const connections = findConnections(thisWeek);
  const typeCounts = { nota: 0, idea: 0, tarea: 0, reflexion: 0 };
  thisWeek.forEach(e => typeCounts[e.type] = (typeCounts[e.type] || 0) + 1);
  const allTags = [...new Set(thisWeek.flatMap(e => e.tags))];

  let html = `<div class="review-header">
    <div class="review-title">📋 Revisión de la Semana</div>
    <div class="review-subtitle">${getWeekRange()} · ${thisWeek.length} entradas capturadas · ${Object.keys(topics).length} temas identificados</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-value">${thisWeek.length}</div><div class="stat-label">Entradas totales</div></div>
    <div class="stat-card"><div class="stat-value">${Object.keys(topics).length}</div><div class="stat-label">Temas</div></div>
    <div class="stat-card"><div class="stat-value">${connections.length}</div><div class="stat-label">Conexiones</div></div>
    <div class="stat-card"><div class="stat-value">${allTags.length}</div><div class="stat-label">Etiquetas únicas</div></div>
  </div>

  <div class="section-heading"><i data-lucide="layers"></i> Organización por Temas</div>
  <div class="topic-summary-grid">`;

  let ci = 0;
  for (const [topic, topicEntries] of Object.entries(topics)) {
    const { color, bg } = TOPIC_COLORS[ci % TOPIC_COLORS.length]; ci++;
    const typesSummary = {};
    topicEntries.forEach(e => typesSummary[e.type] = (typesSummary[e.type] || 0) + 1);
    const typeSummaryStr = Object.entries(typesSummary).map(([t, n]) => `${n} ${entryTypeLabel(t).toLowerCase()}${n > 1 ? 's' : ''}`).join(', ');

    html += `<div class="topic-summary-card" style="--topic-color:${color};background:color-mix(in oklch, ${color} 5%, var(--color-surface));">
      <style>.topic-summary-card[style*='${color}']::before { background: ${color}; }</style>
      <div class="topic-summary-card-header">
        <div class="topic-dot" style="background:${color}; width:12px; height:12px;"></div>
        <span class="topic-summary-title">${escHtml(topic)}</span>
        <span class="topic-summary-count">${topicEntries.length} entrada${topicEntries.length !== 1 ? 's' : ''} · ${typeSummaryStr}</span>
      </div>
      <ul class="topic-summary-items">
        ${topicEntries.map(e => `<li><strong>${escHtml(e.title)}</strong>${e.body ? ': ' + escHtml(e.body.substring(0, 80)) + (e.body.length > 80 ? '…' : '') : ''}</li>`).join('')}
      </ul>
    </div>`;
  }

  html += `</div>`;

  if (connections.length > 0) {
    html += `<div class="section-heading"><i data-lucide="git-merge"></i> Conexiones Relevantes</div>
    <div class="connections-list">`;

    connections.forEach(conn => {
      const dots = Array.from({ length: 3 }, (_, i) =>
        `<div class="strength-dot ${i < conn.strength ? 'filled' : ''}"></div>`
      ).join('');
      html += `<div class="connection-card">
        <div class="connection-header">
          <div class="connection-strength">${dots}</div>
          <div class="connection-topics">
            <span>${escHtml(conn.topicA)}</span>
            <span class="connection-arrow">↔</span>
            <span>${escHtml(conn.topicB)}</span>
          </div>
        </div>
        <div class="connection-body">${conn.description}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Action items (tareas)
  const tareas = thisWeek.filter(e => e.type === 'tarea');
  if (tareas.length > 0) {
    html += `<div class="section-heading"><i data-lucide="check-circle-2"></i> Tareas de la Semana</div>
    <div style="margin-bottom:var(--space-8)">
      ${tareas.map(e => renderEntryCard(e, false)).join('')}
    </div>`;
  }

  // Ideas
  const ideas = thisWeek.filter(e => e.type === 'idea');
  if (ideas.length > 0) {
    html += `<div class="section-heading"><i data-lucide="lightbulb"></i> Ideas Generadas</div>
    <div style="margin-bottom:var(--space-8)">
      ${ideas.map(e => renderEntryCard(e, false)).join('')}
    </div>`;
  }

  // Suggested next actions
  html += `<div class="section-heading"><i data-lucide="arrow-right-circle"></i> Sugerencias para la Próxima Semana</div>
  <div class="topic-summary-card" style="margin-bottom:var(--space-8)">
    <ul class="topic-summary-items">
      ${Object.keys(topics).slice(0, 3).map(t => `<li>Profundizar en <strong>${escHtml(t)}</strong>: revisa las entradas de esta semana y busca nuevas fuentes</li>`).join('')}
      ${connections.length > 0 ? `<li>Explora la conexión entre <strong>${escHtml(connections[0].topicA)}</strong> y <strong>${escHtml(connections[0].topicB)}</strong></li>` : ''}
      ${tareas.length > 0 ? `<li>Da seguimiento a las <strong>${tareas.length} tarea${tareas.length !== 1 ? 's' : ''}</strong> capturada${tareas.length !== 1 ? 's' : ''} esta semana</li>` : ''}
      <li>Captura reflexiones sobre lo aprendido antes de empezar la siguiente semana</li>
    </ul>
  </div>

  <div style="text-align:center;margin-bottom:var(--space-8)">
    <button class="btn btn-ghost" onclick="resetReview()"><i data-lucide="refresh-cw"></i> Regenerar revisión</button>
  </div>`;

  document.getElementById('review-content').innerHTML = html;
  document.getElementById('review-generator').style.display = 'none';
  document.getElementById('review-content').style.display = '';
  reviewGenerated = true;
  lucide.createIcons();
}

function resetReview() {
  reviewGenerated = false;
  document.getElementById('review-generator').style.display = '';
  document.getElementById('review-content').style.display = 'none';
}
